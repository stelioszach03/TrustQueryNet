experiment_name: q1-ham10000-convnext-gce-no-repair
output_dir: artifacts/runs/q1-ham10000-convnext-gce-no-repair
dataset:
  name: ham10000
  root: data
  image_dir: data/ham10000/images
  metadata_csv: data/ham10000/HAM10000_metadata.csv
  split_csv: data/ham10000/splits.csv
  save_split_csv: data/ham10000/splits.csv
  img_size: 224
training:
  backbone: convnext_tiny
  epochs: 20
  batch_size: 32
  lr: 0.0001
  loss: generalized_cross_entropy
  sampler: shuffle
  amp: true
  warmup_epochs: 2
  early_stopping_patience: 4
noise:
  type: transition_matrix
  matrix:
    - [0.92, 0.00, 0.03, 0.00, 0.05, 0.00, 0.00]
    - [0.00, 0.93, 0.04, 0.00, 0.03, 0.00, 0.00]
    - [0.01, 0.01, 0.85, 0.00, 0.11, 0.00, 0.02]
    - [0.00, 0.00, 0.02, 0.95, 0.01, 0.00, 0.02]
    - [0.02, 0.00, 0.10, 0.00, 0.86, 0.01, 0.01]
    - [0.00, 0.00, 0.01, 0.00, 0.01, 0.98, 0.00]
    - [0.00, 0.00, 0.02, 0.01, 0.00, 0.00, 0.97]
evaluation:
  checkpoint_policy: best_val_macro_f1
  thresholds:
  num_thresholds: 101
active_learning:
  enabled: false
