experiment_name: q1-ham10000-convnext-clean-upper
output_dir: artifacts/runs/q1-ham10000-convnext-clean-upper
dataset:
  name: ham10000
  root: data
  image_dir: data/ham10000/images
  metadata_csv: data/ham10000/HAM10000_metadata.csv
  split_csv: data/ham10000/splits.csv
  save_split_csv: data/ham10000/splits.csv
  img_size: 224
training:
  backbone: convnext_tiny
  epochs: 20
  batch_size: 32
  lr: 0.0001
  loss: cross_entropy
  label_smoothing: 0.05
  sampler: shuffle
  amp: true
  warmup_epochs: 2
  early_stopping_patience: 4
noise:
  type: symmetric
  rate: 0.0
evaluation:
  checkpoint_policy: best_val_macro_f1
  thresholds:
  num_thresholds: 101
active_learning:
  enabled: false
